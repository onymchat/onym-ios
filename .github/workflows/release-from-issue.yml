name: Release from issue

# Triggered when an issue tagged `release` opens (or gets the `release`
# label later). Discovers `XCTestCase` subclasses, hydrates the issue
# body's `UI_TESTS` section with one checkbox per class, and dispatches
# the existing `Release` workflow with the tag + issue number so its
# `report-to-issue` job can tick boxes after tests run.
#
# The Release workflow itself stays the source of truth for build/test
# steps; this file is purely orchestration.

on:
  issues:
    # Only `opened` — the issue template auto-applies the `release`
    # label as part of issue creation, so the `opened` event payload
    # already includes it. Listening for `labeled` too would dispatch
    # Release twice per submission (once per event); confirmed during
    # the dry-run on issue #42.
    types: [opened]

permissions:
  issues: write       # edit body + post failure comments
  actions: write      # workflow_dispatch the Release workflow
  contents: read

jobs:
  trigger:
    # Skip unless the issue carries the `release` label. Defensive — if
    # someone opens a non-release issue manually, this filter blocks
    # the run before it touches the body or dispatches anything.
    # `opened` is enough.
    if: contains(github.event.issue.labels.*.name, 'release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the v* tag history so the auto-bump step can resolve
          # the latest patch version when the issue's Tag field is left
          # blank. `fetch-tags: true` alone (with default fetch-depth=1)
          # does NOT actually populate refs/tags — the fetch refspec
          # silently omits `+refs/tags/*` and `git tag` returns empty.
          # That bit us once: auto-bump fell into the "fresh repo"
          # branch and dispatched a duplicate v0.0.1 release, which
          # softprops/action-gh-release happily overwrote the original
          # v0.0.1 IPA with the HEAD build. Full clone is the only
          # configuration that reliably ships tags here.
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        env:
          BODY: ${{ github.event.issue.body }}
          ISSUE: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Issue-form `Tag` field renders as `### Tag\n\n<value>\n` in
          # the body. Grab the first non-empty line after that heading
          # (regex-anchored so we don't pick up a tag mentioned later
          # in release notes or manual-QA prose).
          TAG=$(printf '%s' "$BODY" \
            | awk '
                /^### Tag/ { found = 1; next }
                found && NF { print; exit }
              ' \
            | tr -d '[:space:]')
          # GitHub renders empty optional issue-form fields as the
          # placeholder "_No response_". After whitespace strip that
          # collapses to `_Noresponse_` — treat as missing.
          if [ "$TAG" = "_Noresponse_" ]; then
            TAG=""
          fi

          if [ -z "$TAG" ]; then
            # Auto-bump patch from the latest reachable v-tag. `git tag
            # --sort=-v:refname` puts highest first; filter to vX.Y.Z to
            # ignore stray rc/build tags.
            LATEST=$(git tag --sort=-v:refname \
                       | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                       | head -1)
            if [ -z "$LATEST" ]; then
              # Safety net: a fetch glitch leaving the working tree
              # tagless on a non-empty repo would otherwise silently
              # default to v0.0.1 and overwrite the historical first
              # release. Cross-check against the remote before falling
              # through to the fresh-repo path.
              REMOTE_LATEST=$(git ls-remote --tags origin 'refs/tags/v*' 2>/dev/null \
                                | awk '{print $2}' \
                                | sed 's|refs/tags/||' \
                                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                                | sort -V \
                                | tail -1)
              if [ -n "$REMOTE_LATEST" ]; then
                echo "::error::Local repo has no v* tags but remote has $REMOTE_LATEST. The checkout step likely failed to fetch tags — refusing to default to v0.0.1 and overwrite an existing release."
                gh issue comment "$ISSUE" --body "❌ Local repo has no v* tags but remote has \`$REMOTE_LATEST\`. The release workflow's tag fetch is broken; refusing to dispatch to avoid overwriting an existing release. Re-trigger after the workflow is repaired."
                exit 1
              fi
              # First-ever release on a genuinely fresh repo — start at v0.0.1.
              TAG="v0.0.1"
              echo "::notice::No existing v* tags; defaulting to $TAG"
            else
              # Here-string instead of a heredoc — a multi-line heredoc
              # would force `EOF` to column 0, which breaks YAML's
              # `run: |` block scalar indentation rules. `<<<` is a
              # single-line construct safe at any column.
              IFS='.' read -r MAJOR MINOR PATCH <<<"${LATEST#v}"
              TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
              echo "::notice::Tag field blank; auto-bumping ${LATEST} → ${TAG}"
            fi
            echo "auto_bumped=1" >> "$GITHUB_OUTPUT"
          else
            echo "auto_bumped=0" >> "$GITHUB_OUTPUT"
          fi

          if ! printf '%s' "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$TAG' is not vX.Y.Z"
            gh issue comment "$ISSUE" --body "❌ Tag \`$TAG\` is not in \`vX.Y.Z\` format. Edit the issue and retry, or close + open a new one."
            exit 1
          fi

          # Refuse to dispatch on a tag that already exists. This is the
          # only check that catches a manually-typed tag colliding with
          # a previous release; the auto-bump path can't hit it.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' already exists"
            gh issue comment "$ISSUE" --body "❌ Tag \`$TAG\` already exists on the repo. Pick a higher patch version or leave the Tag field blank to auto-bump."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Discover XCTestCase classes + tests
        id: discover
        run: |
          # `discover_tests.py` walks both test targets, finds every
          # XCTestCase subclass + its `test_*` methods, extracts `///`
          # doc comments, and emits the markdown checklist:
          #   - [ ] <Target>.<Class> — <first sentence of class doc>
          #     - <first sentence of test doc>   (only when authored)
          #
          # Swift Testing (`@Test`) is intentionally NOT discovered —
          # the test targets are XCTest-only as of v0.0.9. When/if Swift
          # Testing lands, extend the script.
          COUNT=$(python3 .github/workflows/discover_tests.py \
                    --root . \
                    --out /tmp/classes_section.md)
          if [ -z "$COUNT" ] || [ "$COUNT" -eq 0 ]; then
            echo "::error::No XCTestCase classes found — discovery regex broke?"
            exit 1
          fi
          echo "Discovered $COUNT classes"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          cat /tmp/classes_section.md

      - name: Hydrate Tag + UI_TESTS sections in issue body
        env:
          BODY: ${{ github.event.issue.body }}
          ISSUE: ${{ github.event.issue.number }}
          COUNT: ${{ steps.discover.outputs.count }}
          TAG: ${{ steps.tag.outputs.tag }}
          AUTO_BUMPED: ${{ steps.tag.outputs.auto_bumped }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Prepend a one-line summary to the discovered checklist. The
          # report-to-issue job in `Release` flips per-class boxes to
          # `[x]` after xcodebuild finishes; `apply_results.py`
          # preserves the trailing ` — <description>` verbatim.
          {
            echo "_Discovered ${COUNT} XCTestCase classes — boxes flip to \`[x]\` once \`Release\` finishes._"
            echo ""
            cat /tmp/classes_section.md
          } > /tmp/ui_tests_section.md

          # Two body rewrites in one edit:
          #   1. Replace the `### Tag` section's value with the resolved
          #      tag (idempotent when the user typed it; meaningful when
          #      it was auto-bumped from `_No response_`).
          #   2. Replace everything between the UI_TESTS markers with the
          #      hydrated checklist.
          # Single python invocation so we make exactly one `gh issue
          # edit` call afterwards.
          python3 - <<'PY' "$BODY" /tmp/ui_tests_section.md "$TAG" /tmp/new_body.md
          import re, sys, pathlib
          body = sys.argv[1]
          new_section = pathlib.Path(sys.argv[2]).read_text()
          tag = sys.argv[3]
          out_path = pathlib.Path(sys.argv[4])

          # Rewrite `### Tag\n\n<old>\n` → `### Tag\n\n<tag>\n`. The
          # `<old>` runs from the blank line under the heading to the
          # next blank line (issue forms separate fields with one blank
          # line). Captures `### Tag` followed by exactly one blank line
          # then a single non-empty line (issue forms render single-line
          # `input` fields that way; `_No response_` is also one line).
          tag_pattern = re.compile(
              r"^(### Tag\s*\n\n)([^\n]+)$",
              re.MULTILINE,
          )
          if not tag_pattern.search(body):
              sys.exit("FATAL: '### Tag' heading + value line not found in body")
          body = tag_pattern.sub(rf"\g<1>{tag}", body, count=1)

          start = "<!-- UI_TESTS_START -->"
          end = "<!-- UI_TESTS_END -->"
          ui_pattern = re.compile(
              re.escape(start) + r".*?" + re.escape(end),
              re.DOTALL,
          )
          replacement = f"{start}\n{new_section}\n{end}"
          if not ui_pattern.search(body):
              sys.exit(f"FATAL: markers {start!r}/{end!r} not found in issue body")
          body = ui_pattern.sub(replacement, body)

          out_path.write_text(body)
          PY
          gh issue edit "$ISSUE" --body-file /tmp/new_body.md

          if [ "$AUTO_BUMPED" = "1" ]; then
            gh issue comment "$ISSUE" --body "ℹ️ Tag field was blank — auto-bumped to \`${TAG}\` (next patch after the latest \`v*\` tag). Edit the issue and re-open if you want a different version."
          fi

      - name: Dispatch Release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh workflow run Release \
            --ref main \
            -f tag="$TAG" \
            -f issue_number="$ISSUE"
          gh issue comment "$ISSUE" --body "🚀 Dispatched \`Release\` for tag \`$TAG\`. Watch progress in [Actions](https://github.com/${{ github.repository }}/actions/workflows/release.yml). Test results will hydrate the **Test results** section above when the run finishes."
