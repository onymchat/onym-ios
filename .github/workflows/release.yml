name: Release

# Cuts an OnymIOS release: lint → tests → ad-hoc IPA → upload to GH Release.
# Trimmed from stellar-mls/.github/workflows/release.yml — drops TestFlight,
# OTA droplet rsync, Android, NotificationService extension. Just enough to
# get a signed ad-hoc IPA attached to a GitHub Release.
#
# Trigger:
#   gh workflow run Release -f tag=v0.1.0
#
# Required repo secrets:
#   MATCH_GIT_URL        — git URL of the fastlane-match repo (cert/profile vault)
#   MATCH_DEPLOY_KEY     — SSH private key with read access to that repo
#   MATCH_TEAM_ID        — Apple Developer team ID
#   MATCH_PASSWORD       — encryption password for the match vault
#   RELAYER_AUTH_TOKEN   — Bearer token for the deployed relayer
#                          (matches one of the relayer's RELAYER_AUTH_TOKENS).
#                          Bundled into Resources/RelayerSecrets.json at
#                          IPA build time. If unset, the IPA still
#                          builds but relayer calls 401.
#                          (E2E integration tests under Tests/.../Integration/
#                          self-skip via XCTSkip when ONYM_INTEGRATION is
#                          not set — and CI no longer sets it. Run them
#                          locally if needed; see the test files for
#                          the env vars.)
#
# (TestFlight upload is intentionally skipped, so ASC API keys aren't needed.)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string
      issue_number:
        description: 'Optional issue number to report XCTest results to (set automatically when dispatched from `release-from-issue.yml`).'
        required: false
        type: string
        default: ''

permissions:
  contents: write   # tag push + GitHub Release creation + asset upload
  issues: write     # `report-to-issue` ticks per-class checkboxes

# Pipe the dispatch tag straight into `scripts/resolve-release-version.sh`
# (which `generate-xcodeproj.sh` sources). Setting it at workflow level
# means every job's xcodegen run picks up the right value — the IPA's
# `CFBundleShortVersionString` / `CFBundleVersion` (and the About
# screen) match the tag exactly, with `git describe` only used as a
# fallback for one-off local builds. See PR for the full chain.
env:
  RELEASE_VERSION: ${{ inputs.tag }}

jobs:
  lint:
    name: Lint (secret-handling discipline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No off-repo secret reads
        run: python3 scripts/lint-secrets.py
      - name: No secrets reach transport
        run: python3 scripts/lint-no-secret-transport.py

  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          TAG: ${{ inputs.tag }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          {
            echo "## What's Changed"
            echo ""
            git log "$RANGE" --pretty=format:"- %s" --no-merges
            echo ""
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: release_notes.md

  unit-tests:
    name: Unit tests (OnymIOSTests)
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
        with:
          # Asset catalogs (AppIcon, LaunchLogo) are LFS-tracked PNGs.
          # Without this xcodebuild compiles pointer files into
          # Assets.car and any test that touches the icon UI fails.
          lfs: true
          # Full history + tags so `scripts/resolve-release-version.sh`
          # (sourced by `generate-xcodeproj.sh`) can fall back to
          # `git describe` if `RELEASE_VERSION` ever isn't honoured.
          # Belt + braces — the env var is the canonical path.
          fetch-depth: 0

      - name: Force LFS smudge (self-hosted workspace persists across runs)
        # actions/checkout@v4 runs `git lfs fetch` but skips the smudge
        # if the working tree's pointer files match the index — which
        # they do on a runner whose previous checkout was lfs-less.
        # `git lfs pull` re-runs fetch + checkout unconditionally and
        # is cheap once objects are already cached locally.
        run: git lfs pull

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: ./generate-xcodeproj.sh

      - name: Pick + pre-boot iOS Simulator destination
        id: sim
        run: |
          # Pick an available iPhone simulator (devicetypes list includes
          # retired models with no created simulator). Fail loud if none.
          # Pre-boot is required for `simctl spawn booted launchctl setenv`
          # below — xcodebuild's auto-boot happens too late.
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; \
                         devs=[dev for runtime,ds in d.items() \
                                if 'iOS' in runtime \
                                for dev in ds if 'iPhone' in dev['name']]; \
                         print(devs[-1]['udid'] if devs else '', end='')")
          NAME=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; \
                         devs=[dev for runtime,ds in d.items() \
                                if 'iOS' in runtime \
                                for dev in ds if 'iPhone' in dev['name']]; \
                         print(devs[-1]['name'] if devs else '', end='')")
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator device available on runner" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          xcrun simctl boot "$UDID" 2>/dev/null || true   # idempotent
          xcrun simctl bootstatus "$UDID" -b
          echo "Using simulator: $NAME ($UDID)"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: xcodebuild test (unit)
        # NOTE: do NOT pass CODE_SIGNING_ALLOWED=NO — without the synthesised
        # `application-identifier` entitlement, every Keychain call in the
        # IdentityRepository tests fails with errSecMissingEntitlement (-34018).
        # The pre-clean is mandatory on self-hosted runners — xcodebuild
        # refuses to overwrite an existing -resultBundlePath / derivedData
        # directory and exits 64.
        run: |
          rm -rf /tmp/onym-ios-release-unit /tmp/onym-ios-unit.xcresult
          xcodebuild test \
            -project OnymIOS.xcodeproj \
            -scheme OnymIOS \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            -derivedDataPath /tmp/onym-ios-release-unit \
            -resultBundlePath /tmp/onym-ios-unit.xcresult \
            -only-testing:OnymIOSTests

      - name: Upload unit test xcresult
        # `always()` so `report-to-issue` can parse green runs too —
        # not just failures.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-xcresult
          path: /tmp/onym-ios-unit.xcresult
          retention-days: 7

  ui-tests:
    name: UI tests (OnymIOSUITests)
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
        with:
          # See unit-tests checkout — LFS PNGs are needed for the app
          # under test's Assets.car. Without this, XCUI queries against
          # icon-bearing buttons miss because Assets.car holds pointer
          # text instead of pixels.
          lfs: true
          # See unit-tests for fetch-depth rationale (git-describe
          # fallback in `scripts/resolve-release-version.sh`).
          fetch-depth: 0

      - name: Force LFS smudge (self-hosted workspace persists across runs)
        # See unit-tests for rationale. Without this the persistent
        # runner workspace keeps stale pointer files from prior lfs-less
        # checkouts and xcodebuild compiles them into Assets.car.
        run: git lfs pull

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: ./generate-xcodeproj.sh

      - name: Pick + pre-boot iOS Simulator destination
        id: sim
        run: |
          # UI tests benefit from a warm simulator — `xcodebuild test` will
          # auto-boot if needed but the cold-boot adds ~10s and can race the
          # first test's first interaction. Pre-boot here so the runner is
          # ready before xcodebuild even looks at it.
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; \
                         devs=[dev for runtime,ds in d.items() \
                                if 'iOS' in runtime \
                                for dev in ds if 'iPhone' in dev['name']]; \
                         print(devs[-1]['udid'] if devs else '', end='')")
          NAME=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys,os; d=json.load(sys.stdin)['devices']; \
                         devs=[dev for runtime,ds in d.items() \
                                if 'iOS' in runtime \
                                for dev in ds if 'iPhone' in dev['name']]; \
                         print(devs[-1]['name'] if devs else '', end='')")
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator device available on runner" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          xcrun simctl boot "$UDID" 2>/dev/null || true   # idempotent
          xcrun simctl bootstatus "$UDID" -b
          echo "Using simulator: $NAME ($UDID)"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: xcodebuild test (UI)
        # Same Keychain-entitlement note as the unit job — keep CODE_SIGNING
        # at the default so XCUIApplication can use the test-isolated
        # keychain service from the App's --ui-testing branch.
        # The pre-clean is mandatory on self-hosted runners — xcodebuild
        # exits 64 if the -resultBundlePath / derivedData directory exists.
        run: |
          rm -rf /tmp/onym-ios-release-ui /tmp/onym-ios-ui.xcresult
          xcodebuild test \
            -project OnymIOS.xcodeproj \
            -scheme OnymIOS \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            -derivedDataPath /tmp/onym-ios-release-ui \
            -resultBundlePath /tmp/onym-ios-ui.xcresult \
            -only-testing:OnymIOSUITests

      - name: Upload UI test xcresult
        # `always()` so `report-to-issue` can parse green runs too.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-tests-xcresult
          path: /tmp/onym-ios-ui.xcresult
          retention-days: 7

  build:
    runs-on: [self-hosted, macOS, ARM64]
    needs: [lint, create-release, unit-tests, ui-tests]
    # Share the lock with qa-build.yml so a tag-gated release and a
    # manual ad-hoc QA dispatch don't race on /qa/builds.json. Only the
    # build job (where the QA publish runs) takes the lock; lint /
    # tests run in parallel as before.
    concurrency:
      group: qa-build-ios
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          # AppIcon + LaunchLogo PNGs are LFS-tracked. Without this the
          # shipped IPA carries pointer files instead of art and the
          # App Store install will fail icon validation.
          lfs: true
          # See unit-tests for fetch-depth rationale (git-describe
          # fallback in `scripts/resolve-release-version.sh`).
          fetch-depth: 0

      - name: Force LFS smudge (self-hosted workspace persists across runs)
        # See unit-tests for rationale.
        run: git lfs pull

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Bundle relayer auth token
        env:
          RELAYER_AUTH_TOKEN: ${{ secrets.RELAYER_AUTH_TOKEN }}
        run: |
          # Resources/RelayerSecrets.json is gitignored — written here
          # from the repo's RELAYER_AUTH_TOKEN secret so the IPA ships
          # with the right Bearer token for the deployed relayer. If the
          # secret is unset, write an empty token; the IPA will build
          # but every relayer call will 401 — surfaces clearly to the
          # user instead of silently failing.
          cat > Resources/RelayerSecrets.json <<EOF
          { "authToken": "${RELAYER_AUTH_TOKEN}" }
          EOF

      - name: Generate Xcode project
        run: ./generate-xcodeproj.sh

      - name: Configure SSH for Match (job-isolated, no global mutation)
        # PRIOR BUG: this step used to `cat >> ~/.ssh/config <<EOF`. On a
        # self-hosted macOS runner `~` is the runner user's actual home
        # directory, so every release run silently appended a `Host
        # github.com` block to the user's personal SSH config — and
        # because `cat <<EOF` adds no leading newline, on a config that
        # didn't end with `\n` the appended `Host` merged into the
        # previous line's last token (`yes` → `yesHost`), turning the
        # file into garbage and breaking unrelated git operations.
        #
        # New shape: write the key + a job-scoped known_hosts to /tmp,
        # and let the fastlane step pick them up via GIT_SSH_COMMAND.
        # No mutation of `~/.ssh/`.
        env:
          MATCH_DEPLOY_KEY: ${{ secrets.MATCH_DEPLOY_KEY }}
        run: |
          umask 077
          echo "$MATCH_DEPLOY_KEY" > /tmp/match_key
          ssh-keyscan github.com > /tmp/match_known_hosts

      - name: Install Fastlane
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install

      - name: Build ad-hoc IPA
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_TEAM_ID: ${{ secrets.MATCH_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # `-F /dev/null` ignores the runner user's personal SSH config,
          # `-i` pins the per-job key, `IdentitiesOnly` blocks the agent
          # from offering other keys. All ssh invoked by `git clone` of
          # the match repo (and any sub-clones fastlane does) inherits
          # this without touching shared state.
          GIT_SSH_COMMAND: 'ssh -i /tmp/match_key -o IdentitiesOnly=yes -F /dev/null -o UserKnownHostsFile=/tmp/match_known_hosts -o StrictHostKeyChecking=accept-new'
        run: bundle exec fastlane ios release

      - name: Clean up match key
        # Best-effort wipe of the per-job key. /tmp on macOS persists
        # across reboots so leaving it would let the next workflow's
        # user (or a curious local user) read the deploy key.
        if: always()
        run: rm -f /tmp/match_key /tmp/match_known_hosts

      - name: Resolve release version (for IPA filename)
        id: version
        # `scripts/resolve-release-version.sh` is the same script
        # `generate-xcodeproj.sh` sources earlier in this job — emits
        # `MARKETING_VERSION=...` + `CURRENT_PROJECT_VERSION=...` lines,
        # which `>> $GITHUB_OUTPUT` turns into step outputs. Single
        # source of truth for the IPA filename and the bundle version.
        run: scripts/resolve-release-version.sh >> "$GITHUB_OUTPUT"

      - name: Rename IPA with version
        env:
          VERSION: ${{ steps.version.outputs.MARKETING_VERSION }}
        run: mv build/ios/adhoc/OnymIOS.ipa "OnymIOS-${VERSION}.ipa"

      - name: Upload IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: OnymIOS-${{ steps.version.outputs.MARKETING_VERSION }}.ipa

      # ----------------------------------------------------------------
      # Publish the same signed IPA to onym.app/qa/. Steps below mirror
      # `qa-build.yml` — kept inline (rather than extracted into a
      # composite action) so the manual QA dispatch and the tag-gated
      # release stay readable side by side. Refactor opportunity if a
      # third caller ever needs it.
      #
      # On a release run, the dashboard entry is `kind: tag` (`qa-build`
      # uses `kind: branch` for ad-hoc dispatches).
      # ----------------------------------------------------------------

      - name: Stage IPA + generate manifest.plist for QA dashboard
        env:
          VERSION: ${{ inputs.tag }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          IPA_NAME: OnymIOS-${{ steps.version.outputs.MARKETING_VERSION }}.ipa
        run: |
          set -eu
          [ -f "$IPA_NAME" ] || { echo "expected IPA at $IPA_NAME" >&2; exit 1; }

          mkdir -p "dist/qa/ios/${VERSION}"
          cp "$IPA_NAME" "dist/qa/ios/${VERSION}/OnymIOS.ipa"

          # bundle-version in the plist must be a numeric-ish string
          # iOS will render -- the dashboard's display version (the tag
          # without the leading `v`) works fine here; iOS only uses it
          # to detect upgrades.
          MARKETING="${VERSION#v}"

          # OTA manifest. iOS Safari hands this to the system installer
          # when the user taps the itms-services:// link. The IPA's
          # Info.plist must carry the same bundle-identifier
          # ("chat.onym.ios") that match's ad-hoc profile is provisioned
          # for, otherwise the install fails with "unable to install".
          cat > "dist/qa/ios/${VERSION}/manifest.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>https://${HOST}/qa/ios/${VERSION}/OnymIOS.ipa</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>chat.onym.ios</string>
                  <key>bundle-version</key>
                  <string>${MARKETING}</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>Onym</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

          # macOS stat: -f%z (BSD). Linux uses -c%s.
          echo "IPA_SIZE=$(stat -f%z dist/qa/ios/${VERSION}/OnymIOS.ipa)" >> "$GITHUB_ENV"

      - name: Build dashboard entry + merge into builds.json
        env:
          VERSION:    ${{ inputs.tag }}
          TAG:        ${{ inputs.tag }}
          COMMIT:     ${{ github.sha }}
          ISSUE:      ${{ inputs.issue_number }}
          REPO:       ${{ github.repository }}
          RUN_ID:     ${{ github.run_id }}
          HOST:       ${{ secrets.DEPLOY_HOST }}
          GH_TOKEN:   ${{ github.token }}
        run: |
          set -eu
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          COMMIT_SHORT=$(printf '%s' "$COMMIT" | cut -c1-5)

          # Resolve the originating release issue's title + body
          # (best-effort; gh failure -> empty strings). Issue number is
          # plumbed in by release-from-issue.yml; manual `gh workflow run
          # Release` dispatches without it leave the field null. `body`
          # powers the Test Plan section on the build details page
          # (public/qa/build/ in onym-website) without the page having
          # to hit the GitHub API at view time.
          ISSUE_OBJ='null'
          if [ -n "$ISSUE" ]; then
            ISSUE_JSON=$(gh issue view "$ISSUE" --repo "$REPO" --json title,body 2>/dev/null || echo '{}')
            TITLE=$(printf '%s' "$ISSUE_JSON" | jq -r '.title // ""')
            BODY=$(printf  '%s' "$ISSUE_JSON" | jq -r '.body  // ""')
            ISSUE_OBJ=$(jq -n \
              --arg n "$ISSUE" --arg t "$TITLE" --arg b "$BODY" \
              --arg url "https://github.com/$REPO/issues/$ISSUE" \
              '{number: ($n|tonumber), title: $t, url: $url, body: $b}')
          fi

          # Schema must match `qa-build.yml`'s entry shape — the
          # dashboard at public/qa/index.html in onym-website renders
          # both kinds with the same fields.
          jq -n \
            --arg platform "ios" \
            --arg version "$VERSION" \
            --arg kind "tag" \
            --arg tag "$TAG" \
            --arg commit "$COMMIT" \
            --arg commit_short "$COMMIT_SHORT" \
            --arg built_at "$BUILT_AT" \
            --arg description "Release ${VERSION}" \
            --argjson issue "$ISSUE_OBJ" \
            --arg install_url  "itms-services://?action=download-manifest&url=https://${HOST}/qa/ios/${VERSION}/manifest.plist" \
            --arg ipa_url      "https://${HOST}/qa/ios/${VERSION}/OnymIOS.ipa" \
            --arg manifest_url "https://${HOST}/qa/ios/${VERSION}/manifest.plist" \
            --argjson size_bytes "${IPA_SIZE}" \
            --arg commit_url   "https://github.com/$REPO/commit/$COMMIT" \
            --arg workflow_url "https://github.com/$REPO/actions/runs/$RUN_ID" \
            '{
              platform: $platform,
              version: $version,
              kind: $kind,
              branch: null,
              tag: $tag,
              commit: $commit,
              commit_short: $commit_short,
              built_at: $built_at,
              description: $description,
              issue: $issue,
              install_url: $install_url,
              ipa_url: $ipa_url,
              manifest_url: $manifest_url,
              size_bytes: $size_bytes,
              commit_url: $commit_url,
              workflow_url: $workflow_url
            }' > /tmp/new-entry.json

          echo "::group::New dashboard entry"
          cat /tmp/new-entry.json
          echo "::endgroup::"

          # Fetch the live builds.json. 404 (no file yet) -> empty skeleton.
          if curl -sf -o /tmp/current.json "https://${HOST}/qa/builds.json"; then
            echo "::notice::Fetched current builds.json from https://${HOST}/qa/builds.json"
          else
            echo "::notice::No existing builds.json -- starting fresh"
            echo '{"schema_version":1,"builds":[]}' > /tmp/current.json
          fi

          # Merge: drop scaffold sample, prepend our entry, dedupe by
          # platform+version (newer wins — re-running a release for the
          # same tag overwrites the dashboard entry with this run's
          # metadata), sort newest first, cap 50.
          jq --slurpfile new /tmp/new-entry.json '
            (if .is_sample == true then .builds = [] else . end)
            | .builds = (
                [$new[0]] + (.builds // [])
                | unique_by(.platform + "@" + .version)
                | sort_by(.built_at) | reverse
                | .[0:50]
              )
            | del(.is_sample)
            | .schema_version = 1
            | .generated_at = (now | todate)
          ' /tmp/current.json > dist/qa/builds.json

          echo "::group::Merged builds.json (head)"
          jq '{schema_version, generated_at, total: (.builds|length), builds: (.builds[0:5])}' dist/qa/builds.json
          echo "::endgroup::"

      - name: Publish to onym.app/qa/
        # delete_stale: false preserves Android uploads under
        # /var/www/onym/qa/android/ and previous iOS builds under
        # /var/www/onym/qa/ios/<other>/.
        uses: onymchat/onym-website/.github/actions/deploy@main
        with:
          source_path: dist/qa
          target_subpath: qa
          ssh_key: ${{ secrets.DEPLOY_SSH_KEY }}
          host: ${{ secrets.DEPLOY_HOST }}
          delete_stale: false

      - name: QA-publish summary
        env:
          VERSION: ${{ inputs.tag }}
          HOST:    ${{ secrets.DEPLOY_HOST }}
        run: |
          {
            echo "## QA build published (alongside GitHub Release \`$VERSION\`)"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | \`$VERSION\` |"
            echo "| IPA | https://${HOST}/qa/ios/${VERSION}/OnymIOS.ipa |"
            echo "| Manifest | https://${HOST}/qa/ios/${VERSION}/manifest.plist |"
            echo "| Install (UDID-registered iPhone) | \`itms-services://?action=download-manifest&url=https://${HOST}/qa/ios/${VERSION}/manifest.plist\` |"
            echo "| Build details | https://${HOST}/qa/build/?platform=ios&version=${VERSION} |"
            echo "| Dashboard | https://${HOST}/qa/?platform=ios |"
            echo
            echo "Tester device must be UDID-registered to the team ad-hoc provisioning profile -- otherwise install fails."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment QA install URL on the linked release issue
        # Best-effort: gh failure must not fail the release run.
        if: success() && inputs.issue_number != ''
        env:
          ISSUE: ${{ inputs.issue_number }}
          VERSION: ${{ inputs.tag }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" <<MSG
          QA build \`${VERSION}\` published to the dashboard.

          - Install on a UDID-registered iPhone: \`itms-services://?action=download-manifest&url=https://${HOST}/qa/ios/${VERSION}/manifest.plist\`
          - Build details (test plan, install, metadata): https://${HOST}/qa/build/?platform=ios&version=${VERSION}
          - IPA: https://${HOST}/qa/ios/${VERSION}/OnymIOS.ipa
          MSG
          if ! gh issue comment "$ISSUE" --repo "$REPO" --body-file "$BODY_FILE"; then
            echo "::warning::Failed to post QA-install comment on issue #$ISSUE (release itself succeeded)."
          fi
          rm -f "$BODY_FILE"

  # ----------------------------------------------------------------------
  # Report XCTest outcomes back into the originating release issue.
  #
  # Runs whether tests passed or failed (`if: always()`), but only when
  # an `issue_number` was supplied (manual `gh workflow run Release -f
  # tag=...` without an issue still works — this job just no-ops).
  # ----------------------------------------------------------------------
  report-to-issue:
    name: Report XCTest results to issue
    runs-on: [self-hosted, macOS, ARM64]
    needs: [unit-tests, ui-tests]
    if: always() && inputs.issue_number != ''
    steps:
      - uses: actions/checkout@v4

      - name: Clear stale xcresult download dirs
        # /tmp persists across runs on the self-hosted runner, and
        # `actions/download-artifact@v4` extracts INTO the destination
        # path without first cleaning it. Leftover blobs from a prior
        # run (or an entire stale `.xcresult` subdirectory) can sit
        # alongside the fresh download, so `xcresulttool` surfaces an
        # older test-suite payload — confirmed in run 25623336567 where
        # `parse_xcresult.py` reported failures for `test_drilldown_…`,
        # a test deleted in #119, even though the freshly-uploaded
        # artifact only contained passing test names. Wipe both before
        # the downloads so each run sees only its own bundles.
        run: rm -rf /tmp/unit-xcresult /tmp/ui-xcresult

      - name: Download unit-tests xcresult
        uses: actions/download-artifact@v4
        with:
          name: unit-tests-xcresult
          path: /tmp/unit-xcresult
        continue-on-error: true   # bundle may be missing if the test job died before upload

      - name: Download ui-tests xcresult
        uses: actions/download-artifact@v4
        with:
          name: ui-tests-xcresult
          path: /tmp/ui-xcresult
        continue-on-error: true

      - name: Parse xcresult bundles into per-class results
        id: parse
        run: |
          # Walk both bundles via `xcrun xcresulttool get test-results
          # tests --format json` (Xcode 16+ API; the legacy
          # `--legacy` flag was removed). Output a JSON map
          # `{<Target>.<Class>: "passed" | "failed"}` plus a per-class
          # failures section for the comment.
          python3 .github/workflows/parse_xcresult.py \
            --bundle "/tmp/unit-xcresult" --target OnymIOSTests \
            --bundle "/tmp/ui-xcresult"   --target OnymIOSUITests \
            --results /tmp/results.json \
            --comment-md /tmp/failure_comment.md

      - name: Tick passed-class checkboxes in issue body
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ inputs.issue_number }}
        run: |
          # Pull the current issue body, replace `[ ] <FQN>` with
          # `[x] <FQN>` for each passed class. Untouched lines are
          # left as `[ ]` so failing / never-ran classes stay open.
          # Only edits between the UI_TESTS markers — Manual QA is
          # never modified.
          gh issue view "$ISSUE" --json body --jq .body > /tmp/current_body.md
          python3 .github/workflows/apply_results.py \
            --body /tmp/current_body.md \
            --results /tmp/results.json \
            --out /tmp/updated_body.md
          gh issue edit "$ISSUE" --body-file /tmp/updated_body.md

      - name: Comment on failures (if any)
        # Only posts when at least one class failed. The `parse` step
        # writes an empty file otherwise.
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ inputs.issue_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -s /tmp/failure_comment.md ]; then
            {
              echo "❌ XCTest failures for [run ${{ github.run_id }}]($RUN_URL):"
              echo ""
              cat /tmp/failure_comment.md
              echo ""
              echo "_xcresult bundles attached as run artifacts._"
            } > /tmp/full_comment.md
            gh issue comment "$ISSUE" --body-file /tmp/full_comment.md
          else
            echo "All discovered XCTestCase classes passed — no comment needed."
          fi
