name: OnymIOS
options:
  bundleIdPrefix: chat.onym
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  developmentLanguage: en

# OnymSDK is consumed via SwiftPM. The released tag pins a
# .binaryTarget pointing at OnymFFI.xcframework attached to the
# matching GitHub Release — SwiftPM downloads it at resolve time, so
# this repo doesn't need Rust, the onym-contracts submodule, or any
# cross-compile toolchain.
packages:
  OnymSDK:
    url: https://github.com/onymchat/onym-sdk-swift.git
    from: 0.0.1

targets:
  OnymIOS:
    type: application
    platform: iOS
    sources:
      - Sources/OnymIOS
      - Resources
    dependencies:
      - package: OnymSDK
    # Hand-written Info.plist via xcodegen's `info:` block. We tried
    # the GENERATE_INFOPLIST_FILE + INFOPLIST_KEY_* approach first but
    # `INFOPLIST_KEY_UILaunchScreen_BackgroundColor` / `_ImageName` are
    # silently ignored by Xcode's auto-generator — the launch dict came
    # out empty, so the asset-catalog launch image never rendered.
    # Migrating to a real Info.plist gives full control over the
    # UILaunchScreen sub-keys (UIColorName + UIImageName) which point
    # at `LaunchBackground` and `LaunchLogo` from
    # `Sources/OnymIOS/Assets.xcassets`. Same shape as stellar-mls.
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Onym
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.onym.ios
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        # Asset catalog name for the AppIcon set. `AppIcon` is the
        # default — explicit so renaming the .appiconset folder fails
        # loud at build time instead of silently producing an unbranded
        # icon.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}

  OnymIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/OnymIOSTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.onym.ios.tests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OnymIOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/OnymIOS"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: OnymIOS
      - package: OnymSDK

  OnymIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/OnymIOSUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.onym.ios.uitests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        TEST_TARGET_NAME: OnymIOS
    dependencies:
      - target: OnymIOS

schemes:
  OnymIOS:
    build:
      targets:
        OnymIOS: all
        OnymIOSTests: [test]
        OnymIOSUITests: [test]
    run:
      config: Debug
      environmentVariables:
        OS_ACTIVITY_MODE: disable
    test:
      config: Debug
      targets:
        - OnymIOSTests
        - OnymIOSUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
