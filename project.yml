name: OnymIOS
options:
  bundleIdPrefix: app.onym
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  developmentLanguage: en

# OnymSDK is consumed via SwiftPM. The released tag pins a
# .binaryTarget pointing at OnymFFI.xcframework attached to the
# matching GitHub Release — SwiftPM downloads it at resolve time, so
# this repo doesn't need Rust, the onym-contracts submodule, or any
# cross-compile toolchain.
packages:
  OnymSDK:
    url: https://github.com/onymchat/onym-sdk-swift.git
    from: 0.0.2

targets:
  OnymIOS:
    type: application
    platform: iOS
    sources:
      - Sources/OnymIOS
      - Resources
    dependencies:
      - package: OnymSDK
    # Hand-written Info.plist via xcodegen's `info:` block. We tried
    # the GENERATE_INFOPLIST_FILE + INFOPLIST_KEY_* approach first but
    # `INFOPLIST_KEY_UILaunchScreen_BackgroundColor` / `_ImageName` are
    # silently ignored by Xcode's auto-generator — the launch dict came
    # out empty, so the asset-catalog launch image never rendered.
    # Migrating to a real Info.plist gives full control over the
    # UILaunchScreen sub-keys (UIColorName + UIImageName) which point
    # at `LaunchBackground` and `LaunchLogo` from
    # `Sources/OnymIOS/Assets.xcassets`. Same shape as stellar-mls.
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Onym
        # `$(...)` is Xcode's build-setting substitution, NOT xcodegen
        # env interpolation — these strings end up verbatim in
        # Info.plist and Xcode resolves them per build. The
        # MARKETING_VERSION / CURRENT_PROJECT_VERSION build settings
        # below are interpolated by xcodegen at generate time
        # (see `${...}` in `settings.base`), so the chain is:
        #     resolve-release-version.sh
        #         → env MARKETING_VERSION
        #             → xcodegen `${MARKETING_VERSION}` interpolation
        #                 → Build Setting in pbxproj
        #                     → `$(MARKETING_VERSION)` in Info.plist
        #                         → Bundle.main.infoDictionary at runtime
        # xcodegen does NOT emit these keys by default; without them
        # Info.plist falls back to its hand-written `1.0` / `1` and the
        # About screen ships a stale value forever.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # PR-6: custom URL scheme for the Level-2 deeplink invite
        # fallback. `onym://join?c=…` lands in `.onOpenURL`. The
        # CFBundleURLName uses bundle-prefix namespacing per Apple
        # convention; CFBundleURLSchemes must be `onym` (not the
        # bundle id) to match the Android scheme so the same URL
        # works on both platforms.
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: app.onym.ios.join
            CFBundleURLSchemes:
              - onym
        # Camera access is requested only when the user taps "Scan QR"
        # on the Create Group → Invite by Inbox Key screen
        # (`QRCodeScannerView`). The camera frame is decoded on-device
        # via AVFoundation's QR metadata output and never leaves the
        # process; we only consume the decoded string payload.
        NSCameraUsageDescription: Onym uses the camera to scan invite-key QR codes when you add someone to a group.
    entitlements:
      path: OnymIOS.entitlements
      properties:
        # PR-6: Universal Links for `https://onym.app/join*` and
        # `https://onym.app/onboard*`. The matching AASA file at
        # `https://onym.app/.well-known/apple-app-site-association`
        # must list the team-prefixed app id (7C7LXXWRMG.app.onym.ios)
        # against `appIDs`. Without the AASA file the OS still
        # routes the URL through the browser; the app only takes
        # over once Apple's CDN has fetched + validated the file.
        com.apple.developer.associated-domains:
          - applinks:onym.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.onym.ios
        # Single source of truth: the GitHub release tag. xcodegen
        # interpolates `${MARKETING_VERSION}` / `${CURRENT_PROJECT_VERSION}`
        # from the env at generate time; `generate-xcodeproj.sh` always
        # sources `scripts/resolve-release-version.sh` first so these
        # env vars are guaranteed to be set (with a `0.0.0-dev` /
        # `git describe` fallback for local builds between tags).
        MARKETING_VERSION: ${MARKETING_VERSION}
        CURRENT_PROJECT_VERSION: ${CURRENT_PROJECT_VERSION}
        SWIFT_VERSION: "5.0"
        # Asset catalog name for the AppIcon set. `AppIcon` is the
        # default — explicit so renaming the .appiconset folder fails
        # loud at build time instead of silently producing an unbranded
        # icon.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        CODE_SIGN_ENTITLEMENTS: OnymIOS.entitlements

  OnymIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/OnymIOSTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.onym.ios.tests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        TARGETED_DEVICE_FAMILY: "1"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OnymIOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/OnymIOS"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: OnymIOS
      - package: OnymSDK

  OnymIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/OnymIOSUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.onym.ios.uitests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        TARGETED_DEVICE_FAMILY: "1"
        TEST_TARGET_NAME: OnymIOS
    dependencies:
      - target: OnymIOS

schemes:
  OnymIOS:
    build:
      targets:
        OnymIOS: all
        OnymIOSTests: [test]
        OnymIOSUITests: [test]
    run:
      config: Debug
      environmentVariables:
        OS_ACTIVITY_MODE: disable
    test:
      config: Debug
      targets:
        - OnymIOSTests
        - OnymIOSUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
