name: OnymIOS
options:
  bundleIdPrefix: chat.onym
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  developmentLanguage: en

# OnymSDK is consumed via SwiftPM. The released tag pins a
# .binaryTarget pointing at OnymFFI.xcframework attached to the
# matching GitHub Release — SwiftPM downloads it at resolve time, so
# this repo doesn't need Rust, the onym-contracts submodule, or any
# cross-compile toolchain.
packages:
  OnymSDK:
    url: https://github.com/onymchat/onym-sdk-swift.git
    from: 0.0.1

targets:
  OnymIOS:
    type: application
    platform: iOS
    sources:
      - Sources/OnymIOS
      - Resources
    dependencies:
      - package: OnymSDK
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.onym.ios
        INFOPLIST_KEY_CFBundleDisplayName: Onym
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # Without a UILaunchScreen entry, iOS treats the app as a legacy
        # iPhone-4-era binary and letterboxes it on every modern device
        # (visible as huge black bars above and below the app's content).
        # Setting this YES makes xcodegen emit an empty `UILaunchScreen`
        # dict in Info.plist — opt-in to native dimensions, no real
        # launch storyboard required since the SwiftUI scene takes over
        # immediately on launch.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}

  OnymIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/OnymIOSTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.onym.ios.tests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OnymIOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/OnymIOS"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: OnymIOS
      - package: OnymSDK

  OnymIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/OnymIOSUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.onym.ios.uitests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        TEST_TARGET_NAME: OnymIOS
    dependencies:
      - target: OnymIOS

schemes:
  OnymIOS:
    build:
      targets:
        OnymIOS: all
        OnymIOSTests: [test]
        OnymIOSUITests: [test]
    run:
      config: Debug
      environmentVariables:
        OS_ACTIVITY_MODE: disable
    test:
      config: Debug
      targets:
        - OnymIOSTests
        - OnymIOSUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
